<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet - Fire Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-10">

    <div class="p-5 flex items-center bg-slate-900 sticky top-0 z-50 shadow-lg">
        <button onclick="history.back()" class="text-xl mr-4"><i class="fas fa-arrow-left"></i></button>
        <h1 class="text-xl font-bold uppercase tracking-wider">My Wallet</h1>
    </div>

    <div class="p-5 max-w-md mx-auto space-y-6">
        
        <div class="glass p-8 rounded-[2rem] border border-slate-700 text-center shadow-2xl">
            <p class="text-slate-400 text-sm mb-1 uppercase tracking-widest">বর্তমান ব্যালেন্স</p>
            <h2 class="text-5xl font-black text-orange-500">৳ <span id="userBalance">0</span></h2>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="glass p-4 rounded-2xl border border-pink-500/20 text-center">
                <p class="text-[10px] text-pink-500 font-bold uppercase">Bkash (Personal)</p>
                <p id="dispBkash" class="text-sm font-mono mt-1 italic">লোড হচ্ছে...</p>
            </div>
            <div class="glass p-4 rounded-2xl border border-orange-500/20 text-center">
                <p class="text-[10px] text-orange-500 font-bold uppercase">Nagad (Personal)</p>
                <p id="dispNagad" class="text-sm font-mono mt-1 italic">লোড হচ্ছে...</p>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl border border-slate-700">
            <h3 class="font-bold mb-4 text-green-500 border-b border-slate-700 pb-2"><i class="fas fa-plus-circle mr-2"></i>টাকা অ্যাড করুন</h3>
            <div class="space-y-4">
                <select id="depMethod" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none">
                    <option value="Bkash">Bkash</option>
                    <option value="Nagad">Nagad</option>
                </select>
                <input type="number" id="depAmount" placeholder="টাকার পরিমাণ (৳)" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none">
                <input type="text" id="depTrx" placeholder="Transaction ID (TrxID)" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none uppercase font-mono">
                <button id="btnDeposit" class="w-full bg-green-600 py-4 rounded-2xl font-bold shadow-lg shadow-green-900 active:scale-95 transition">সাবমিট রিকোয়েস্ট</button>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl border border-slate-700">
            <h3 class="font-bold mb-4 text-red-500 border-b border-slate-700 pb-2"><i class="fas fa-paper-plane mr-2"></i>টাকা উইথড্র করুন</h3>
            <div class="space-y-4">
                <select id="witMethod" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none">
                    <option value="Bkash">Bkash</option>
                    <option value="Nagad">Nagad</option>
                </select>
                <input type="number" id="witNumber" placeholder="বিকাশ/নগদ নম্বর" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none">
                <input type="number" id="witAmount" placeholder="উইথড্র পরিমাণ (মিনিমাম ৫০)" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none">
                <button id="btnWithdraw" class="w-full bg-red-600 py-4 rounded-2xl font-bold shadow-lg shadow-red-900 active:scale-95 transition">উইথড্র রিকোয়েস্ট</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, addDoc, collection, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDB15lIz0BwUaErArj-ooETB79iPCZK3D4",
            authDomain: "bot-864b3.firebaseapp.com",
            projectId: "bot-864b3",
            storageBucket: "bot-864b3.firebasestorage.app",
            messagingSenderId: "82198701869",
            appId: "1:82198701869:web:3c099992e1c64e285355a4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        // ব্যালেন্স ও নম্বর আপডেট (রিয়েল-টাইম)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if(docSnap.exists()) document.getElementById('userBalance').innerText = docSnap.data().wallet || 0;
                });
            } else { location.href = "auth.html"; }
        });

        // অ্যাডমিন থেকে নম্বর লোড
        onSnapshot(doc(db, "settings", "general"), (docSnap) => {
            if(docSnap.exists()) {
                document.getElementById('dispBkash').innerText = docSnap.data().bkash || "অফলাইন";
                document.getElementById('dispNagad').innerText = docSnap.data().nagad || "অফলাইন";
            }
        });

        // ১. অ্যাড মানি লজিক
        document.getElementById('btnDeposit').onclick = async () => {
            const method = document.getElementById('depMethod').value;
            const amount = Number(document.getElementById('depAmount').value);
            const trxid = document.getElementById('depTrx').value;

            if(amount < 10 || !trxid) return alert("সঠিক তথ্য দিন!");

            await addDoc(collection(db, "deposit_requests"), {
                userId: currentUser.uid,
                method, amount, trxid,
                status: "Pending",
                time: new Date().toLocaleString()
            });
            alert("রিকোয়েস্ট পাঠানো হয়েছে!"); location.reload();
        };

        // ২. উইথড্র লজিক
        document.getElementById('btnWithdraw').onclick = async () => {
            const method = document.getElementById('witMethod').value;
            const number = document.getElementById('witNumber').value;
            const amount = Number(document.getElementById('witAmount').value);

            if(!number || amount < 50) return alert("সঠিক তথ্য দিন (মিনিমাম ৫০)");

            // ব্যালেন্স চেক
            const userRef = doc(db, "users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            if(userSnap.data().wallet < amount) return alert("আপনার ব্যালেন্স পর্যাপ্ত নয়!");

            try {
                // ওয়ালেট থেকে টাকা কেটে নেওয়া
                await updateDoc(userRef, { wallet: increment(-amount) });
                
                // রিকোয়েস্ট পাঠানো
                await addDoc(collection(db, "withdraw_requests"), {
                    userId: currentUser.uid,
                    userName: userSnap.data().name,
                    method, number, amount,
                    status: "Pending",
                    time: new Date().toLocaleString()
                });
                alert("উইথড্র রিকোয়েস্ট সফল হয়েছে!"); location.reload();
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
  </html>
