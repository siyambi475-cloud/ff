<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details - Fire Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-20">

    <div class="p-5 flex items-center bg-slate-900 sticky top-0 z-50 shadow-lg">
        <button onclick="history.back()" class="text-xl mr-4"><i class="fas fa-arrow-left"></i></button>
        <h1 class="text-xl font-bold uppercase tracking-wider">Match Details</h1>
    </div>

    <div id="matchContent" class="p-5 max-w-md mx-auto space-y-6">
        <p class="text-center py-20 italic opacity-50">ম্যাচ তথ্য লোড হচ্ছে...</p>
    </div>

    <div id="joinSection" class="fixed bottom-0 left-0 right-0 p-4 bg-slate-900 border-t border-slate-800 hidden">
        <input type="text" id="gameIdInput" placeholder="আপনার গেম আইডি (In-game ID) দিন" class="w-full p-4 mb-3 bg-slate-800 border border-slate-700 rounded-2xl text-white outline-none">
        <button id="joinBtn" class="w-full bg-orange-600 py-4 rounded-2xl font-bold shadow-lg shadow-orange-900 active:scale-95 transition">JOIN NOW</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, getDocs, collection, query, where, addDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDB15lIz0BwUaErArj-ooETB79iPCZK3D4",
            authDomain: "bot-864b3.firebaseapp.com",
            projectId: "bot-864b3",
            storageBucket: "bot-864b3.firebasestorage.app",
            messagingSenderId: "82198701869",
            appId: "1:82198701869:web:3c099992e1c64e285355a4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('id');
        let matchData = null;

        // ১. ম্যাচের তথ্য লোড করা
        async function loadMatchDetails() {
            if(!matchId) return;
            const docRef = doc(db, "tournaments", matchId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                matchData = docSnap.data();
                renderMatch();
                checkUserStatus(); // ইউজার জয়েন করেছে কিনা চেক
            }
        }

        function renderMatch() {
            document.getElementById('matchContent').innerHTML = `
                <div class="glass p-6 rounded-[2rem] border border-slate-700 shadow-2xl">
                    <h2 class="text-2xl font-black text-orange-500 mb-4">${matchData.title}</h2>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                            <p class="text-slate-400">এন্ট্রি ফি</p>
                            <p class="font-bold text-lg">৳${matchData.fee}</p>
                        </div>
                        <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                            <p class="text-slate-400">উইনার প্রাইজ</p>
                            <p class="font-bold text-lg text-green-500">৳${matchData.prize}</p>
                        </div>
                        <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                            <p class="text-slate-400">পার কিল</p>
                            <p class="font-bold text-lg">৳${matchData.perkill}</p>
                        </div>
                        <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                            <p class="text-slate-400">ম্যাপ</p>
                            <p class="font-bold text-lg">${matchData.mode}</p>
                        </div>
                    </div>
                    <div class="mt-6 p-4 bg-indigo-900/30 border border-indigo-500/20 rounded-2xl">
                        <p class="text-xs text-indigo-300"><i class="far fa-clock mr-2"></i>ম্যাচ টাইম: ${matchData.time}</p>
                    </div>
                </div>
                
                ${matchData.roomId ? `
                <div class="bg-green-900/20 border border-green-500/30 p-6 rounded-3xl text-center">
                    <p class="text-green-500 font-bold mb-2 uppercase tracking-widest text-xs">Room Details</p>
                    <p class="text-xl font-mono">ID: ${matchData.roomId} | PASS: ${matchData.roomPass}</p>
                </div>` : ''}
            `;
            document.getElementById('joinSection').classList.remove('hidden');
        }

        // ২. চেক করা ইউজার ইতিমধ্যে জয়েন করেছে কি না
        async function checkUserStatus() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const q = query(collection(db, "joined_players"), 
                                    where("matchId", "==", matchId), 
                                    where("userId", "==", user.uid));
                    const querySnapshot = await getDocs(q);

                    if (!querySnapshot.empty) {
                        const btn = document.getElementById('joinBtn');
                        btn.innerText = "ALREADY JOINED";
                        btn.disabled = true;
                        btn.classList.replace('bg-orange-600', 'bg-slate-700');
                        document.getElementById('gameIdInput').classList.add('hidden');
                    }
                }
            });
        }

        // ৩. জয়েন বাটন লজিক
        document.getElementById('joinBtn').onclick = async () => {
            if(!auth.currentUser) return alert("দয়া করে লগইন করুন!");
            const gameId = document.getElementById('gameIdInput').value;
            if(!gameId) return alert("গেম আইডি দিন!");

            const userRef = doc(db, "users", auth.currentUser.uid);
            const userSnap = await getDoc(userRef);
            const balance = userSnap.data().wallet || 0;

            if(balance < matchData.fee) return alert("ব্যালেন্স নেই, টাকা অ্যাড করুন!");

            if(confirm(`৳${matchData.fee} দিয়ে জয়েন করবেন?`)) {
                try {
                    // ডাবল চেক: ক্লিক করার মুহূর্তেও চেক করবে যাতে নেট স্লো হলেও ডুপ্লিকেট না হয়
                    const q = query(collection(db, "joined_players"), 
                                    where("matchId", "==", matchId), 
                                    where("userId", "==", auth.currentUser.uid));
                    const doubleCheck = await getDocs(q);
                    if(!doubleCheck.empty) return alert("আপনি ইতিমধ্যে জয়েন করেছেন!");

                    // টাকা কাটা এবং ডাটা সেভ
                    await updateDoc(userRef, { wallet: increment(-matchData.fee) });
                    await addDoc(collection(db, "joined_players"), {
                        matchId: matchId,
                        userId: auth.currentUser.uid,
                        playerName: userSnap.data().name,
                        gameId: gameId,
                        time: new Date().toLocaleString()
                    });

                    alert("সফলভাবে জয়েন করেছেন!");
                    location.reload();
                } catch (e) { alert(e.message); }
            }
        };

        loadMatchDetails();
    </script>
</body>
</html>
