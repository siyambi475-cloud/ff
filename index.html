<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Tournament - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white pb-20">

    <nav class="p-4 bg-gray-800 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-black text-orange-500 italic">FREE FIRE PRO</h1>
        <div class="flex items-center space-x-4">
            <div class="bg-gray-700 px-3 py-1 rounded-full flex items-center">
                <i class="fas fa-wallet text-yellow-500 mr-2"></i>
                <span id="userBalance" class="font-bold">৳ ০</span>
            </div>
            <i class="fas fa-user-circle text-2xl text-gray-400" onclick="window.location.href='profile.html'"></i>
        </div>
    </nav>

    <div class="p-4">
        <div class="bg-gradient-to-r from-orange-600 to-red-600 p-6 rounded-2xl shadow-lg">
            <h2 class="text-xl font-bold">আজকের স্পেশাল টুর্নামেন্ট!</h2>
            <p class="text-sm opacity-90">জয়েন করুন এবং জিতে নিন আকর্ষণীয় পুরস্কার।</p>
        </div>
    </div>

    <div class="px-4">
        <h3 class="text-lg font-bold mb-4 flex items-center">
            <i class="fas fa-gamepad text-orange-500 mr-2"></i> চলমান টুর্নামেন্ট সমূহ
        </h3>
        
        <div id="tournamentContainer" class="space-y-4">
            <p class="text-center text-gray-500">ম্যাচ লোড হচ্ছে...</p>
        </div>
    </div>

    <div class="fixed bottom-0 w-full bg-gray-800 p-3 flex justify-around border-t border-gray-700">
        <button onclick="location.reload()" class="text-orange-500 text-center">
            <i class="fas fa-home text-xl"></i><br><span class="text-xs">Home</span>
        </button>
        <button onclick="window.location.href='wallet.html'" class="text-gray-400 text-center">
            <i class="fas fa-coins text-xl"></i><br><span class="text-xs">Wallet</span>
        </button>
        <button onclick="window.location.href='history.html'" class="text-gray-400 text-center">
            <i class="fas fa-trophy text-xl"></i><br><span class="text-xs">Result</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDB15lIz0BwUaErArj-ooETB79iPCZK3D4",
            authDomain: "bot-864b3.firebaseapp.com",
            projectId: "bot-864b3",
            storageBucket: "bot-864b3.firebasestorage.app",
            messagingSenderId: "82198701869",
            appId: "1:82198701869:web:3c099992e1c64e285355a4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ইউজার লগইন আছে কি না চেক করা এবং ব্যালেন্স লোড করা
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    document.getElementById('userBalance').innerText = "৳ " + userDoc.data().wallet;
                }
                loadTournaments();
            } else {
                window.location.href = "auth.html"; // লগইন না থাকলে পাঠিয়ে দিবে
            }
        });

        // টুর্নামেন্ট লোড করার ফাংশন
        async function loadTournaments() {
            const container = document.getElementById('tournamentContainer');
            const querySnapshot = await getDocs(collection(db, "tournaments"));
            
            container.innerHTML = ""; // আগের মেসেজ মুছে ফেলা

            querySnapshot.forEach((docSnap) => {
                const match = docSnap.data();
                container.innerHTML += `
                    <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 shadow-sm">
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="text-lg font-bold">${match.title}</h4>
                                <span class="bg-orange-600 text-[10px] px-2 py-1 rounded uppercase font-bold">${match.mode}</span>
                            </div>
                            <div class="flex justify-between text-sm text-gray-400 mb-4">
                                <span><i class="far fa-clock mr-1"></i> ${match.time}</span>
                                <span><i class="fas fa-users mr-1"></i> স্লট: ${match.slots}</span>
                            </div>
                            <div class="flex justify-between items-center bg-gray-900 p-3 rounded-lg">
                                <div class="text-center">
                                    <p class="text-[10px] text-gray-500 uppercase">প্রাইজ পুল</p>
                                    <p class="font-bold text-orange-400">৳ ${match.prize}</p>
                                </div>
                                <div class="text-center border-x border-gray-700 px-4">
                                    <p class="text-[10px] text-gray-500 uppercase">এন্ট্রি ফি</p>
                                    <p class="font-bold text-white">৳ ${match.fee}</p>
                                </div>
                                <button onclick="window.location.href='match-details.html?id=${docSnap.id}'" 
                                    class="bg-orange-600 hover:bg-orange-700 px-4 py-2 rounded-lg text-sm font-bold transition">
                                    JOIN
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
