<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match History - Fire Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .tab-active { background-color: #ea580c; border-radius: 0.75rem; }
    </style>
</head>
<body class="pb-10">

    <div class="p-5 flex items-center bg-slate-900 sticky top-0 z-50 shadow-lg">
        <button onclick="history.back()" class="text-xl mr-4"><i class="fas fa-arrow-left"></i></button>
        <h1 class="text-xl font-bold">ম্যাচ হিস্ট্রি</h1>
    </div>

    <div class="p-4">
        <div class="flex bg-slate-800 p-1 rounded-xl">
            <button id="tabOngoing" class="flex-1 py-2 text-sm font-bold tab-active">চলমান ম্যাচ</button>
            <button id="tabResult" class="flex-1 py-2 text-sm font-bold">ফলাফল</button>
        </div>
    </div>

    <div id="matchContainer" class="p-4 space-y-4">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDB15lIz0BwUaErArj-ooETB79iPCZK3D4",
            authDomain: "bot-864b3.firebaseapp.com",
            projectId: "bot-864b3",
            storageBucket: "bot-864b3.firebasestorage.app",
            messagingSenderId: "82198701869",
            appId: "1:82198701869:web:3c099992e1c64e285355a4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const matchContainer = document.getElementById('matchContainer');
        const tabOngoing = document.getElementById('tabOngoing');
        const tabResult = document.getElementById('tabResult');

        // ১. চলমান ম্যাচ লোড করা
        function loadOngoingMatches() {
            tabOngoing.classList.add('tab-active');
            tabResult.classList.remove('tab-active');
            matchContainer.innerHTML = "<p class='text-center py-10 opacity-50 italic text-sm'>চলমান ম্যাচগুলো লোড হচ্ছে...</p>";

            const q = query(collection(db, "tournaments"), where("status", "==", "Upcoming"));
            onSnapshot(q, (snap) => {
                matchContainer.innerHTML = snap.empty ? "<p class='text-center py-10 opacity-50'>কোনো চলমান ম্যাচ নেই</p>" : "";
                snap.forEach(docSnap => {
                    const m = docSnap.data();
                    matchContainer.innerHTML += `
                        <div class="glass p-4 rounded-2xl border border-slate-700">
                            <h3 class="font-bold text-orange-500">${m.title}</h3>
                            <div class="flex justify-between text-[10px] mt-2 opacity-70">
                                <span><i class="far fa-clock mr-1"></i>${m.time}</span>
                                <span><i class="fas fa-users mr-1"></i>${m.mode}</span>
                            </div>
                        </div>`;
                });
            });
        }

        // ২. ফলাফল লোড করা
        async function loadResults() {
            tabResult.classList.add('tab-active');
            tabOngoing.classList.remove('tab-active');
            matchContainer.innerHTML = "<p class='text-center py-10 opacity-50 italic text-sm'>ফলাফল লোড হচ্ছে...</p>";

            // আমরা সেই ম্যাচগুলো খুঁজবো যেগুলোর ডাটাবেসে রেজাল্ট আপডেট হয়েছে
            const q = collection(db, "tournaments");
            const snap = await getDocs(q);
            
            matchContainer.innerHTML = "";
            let hasResults = false;

            snap.forEach(docSnap => {
                const m = docSnap.data();
                // যদি অ্যাডমিন রেজাল্ট আপডেট করে তবেই এখানে দেখাবে
                if (m.roomId && m.roomId !== "") { 
                    hasResults = true;
                    matchContainer.innerHTML += `
                        <div class="glass p-4 rounded-2xl border border-slate-700">
                            <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-2">
                                <h3 class="font-bold text-green-500">${m.title}</h3>
                                <span class="text-[9px] bg-indigo-600 px-2 py-1 rounded">ম্যাচ সম্পন্ন</span>
                            </div>
                            <div class="text-xs space-y-1 opacity-80">
                                <p>উইনার প্রাইজ: ৳${m.prize}</p>
                                <p>পার কিল: ৳${m.perkill}</p>
                            </div>
                            <button onclick="alert('ফলাফল বিস্তারিত সার্ভার থেকে আপডেট হচ্ছে...')" class="w-full mt-3 bg-slate-700 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest">বিজয়ীদের তালিকা দেখুন</button>
                        </div>`;
                }
            });

            if(!hasResults) matchContainer.innerHTML = "<p class='text-center py-10 opacity-50'>এখনো কোনো ফলাফল প্রকাশিত হয়নি</p>";
        }

        // ইভেন্ট লিসেনার
        tabOngoing.onclick = loadOngoingMatches;
        tabResult.onclick = loadResults;

        // প্রথমে চলমান ম্যাচ দেখাবে
        loadOngoingMatches();

    </script>
</body>
</html>
