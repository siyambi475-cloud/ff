<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match History - FF Tournament</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white pb-20">

    <div class="p-4 bg-gray-800 flex justify-between items-center shadow-lg sticky top-0 z-50">
        <div class="flex items-center">
            <i class="fas fa-arrow-left mr-4 cursor-pointer" onclick="window.location.href='index.html'"></i>
            <h2 class="text-xl font-bold uppercase tracking-wide">ম্যাচ হিস্ট্রি</h2>
        </div>
        <i class="fas fa-sync-alt text-orange-500" onclick="location.reload()"></i>
    </div>

    <div class="p-4">
        <div class="flex space-x-2 mb-6 bg-gray-800 p-1 rounded-xl">
            <button id="tabOngoing" class="flex-1 py-2 rounded-lg bg-orange-600 font-bold text-sm transition">চলমান ম্যাচ</button>
            <button id="tabResults" class="flex-1 py-2 rounded-lg text-gray-400 font-bold text-sm transition">ফলাফল</button>
        </div>

        <div id="historyList" class="space-y-4">
            <p class="text-center text-gray-500 py-10">তথ্য খোঁজা হচ্ছে...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDB15lIz0BwUaErArj-ooETB79iPCZK3D4",
            authDomain: "bot-864b3.firebaseapp.com",
            projectId: "bot-864b3",
            storageBucket: "bot-864b3.firebasestorage.app",
            messagingSenderId: "82198701869",
            appId: "1:82198701869:web:3c099992e1c64e285355a4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadHistory(user.uid);
            } else {
                window.location.href = "auth.html";
            }
        });

        async function loadHistory(userUid) {
            const listContainer = document.getElementById('historyList');
            
            // ১. এই ইউজার কোন কোন ম্যাচে জয়েন করেছে তা খোঁজা
            const q = query(collection(db, "joined_players"), where("userId", "==", userUid));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                listContainer.innerHTML = "<p class='text-center text-gray-500 py-10'>আপনি এখনো কোনো ম্যাচে জয়েন করেননি!</p>";
                return;
            }

            listContainer.innerHTML = ""; // আগের মেসেজ ক্লিয়ার করা

            querySnapshot.forEach(async (docSnap) => {
                const joinData = docSnap.data();
                
                // ২. অরিজিনাল টুর্নামেন্টের ডিটেইলস নিয়ে আসা
                const matchDoc = await getDoc(doc(db, "tournaments", joinData.matchId));
                if (matchDoc.exists()) {
                    const match = matchDoc.data();
                    
                    const card = `
                        <div class="bg-gray-800 rounded-2xl p-5 border border-gray-700 shadow-lg">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="font-bold text-lg text-orange-500">${match.title}</h3>
                                <span class="text-[10px] bg-blue-600 px-2 py-1 rounded">JOINED</span>
                            </div>
                            <div class="text-xs text-gray-400 space-y-1 mb-4">
                                <p><i class="far fa-calendar-alt mr-2"></i>সময়: ${match.time}</p>
                                <p><i class="fas fa-money-bill-wave mr-2"></i>এন্ট্রি ফি: ৳${match.fee}</p>
                            </div>
                            
                            <div class="bg-gray-900 p-3 rounded-xl border border-dashed border-gray-600">
                                <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Room Details</p>
                                <div class="flex justify-between text-sm">
                                    <span>ID: <span class="text-white font-mono">${match.roomId || 'অপেক্ষা করুন...'}</span></span>
                                    <span>Pass: <span class="text-white font-mono">${match.roomPass || '****'}</span></span>
                                </div>
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += card;
                }
            });
        }
    </script>
</body>
</html>
