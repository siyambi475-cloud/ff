<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Admin - Fire Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <div class="bg-indigo-900 text-white p-6 shadow-xl flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black italic text-orange-500">FIRE ARENA ADMIN</h1>
        <div class="flex gap-2">
            <button onclick="location.reload()" class="bg-indigo-700 px-4 py-2 rounded-lg text-xs"><i class="fas fa-sync"></i> Refresh</button>
        </div>
    </div>

    <div class="p-4 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-3xl shadow-md border border-gray-100">
            <h2 class="text-xl font-bold mb-4 text-indigo-900 border-b pb-2"><i class="fas fa-plus-circle mr-2"></i>ম্যাচ তৈরি</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="tTitle" placeholder="ম্যাচ নাম" class="p-3 bg-gray-50 border rounded-xl outline-none col-span-2">
                <input type="number" id="tFee" placeholder="এন্ট্রি ফি (৳)" class="p-3 bg-gray-50 border rounded-xl outline-none">
                <input type="number" id="tPrize" placeholder="উইনার প্রাইজ (৳)" class="p-3 bg-gray-50 border rounded-xl outline-none">
                <input type="number" id="tPerKill" placeholder="পার কিল (৳)" class="p-3 bg-gray-50 border rounded-xl outline-none">
                <input type="number" id="tSlots" placeholder="মোট স্লট (যেমন: ৪৮)" class="p-3 bg-gray-50 border rounded-xl outline-none">
                <select id="tMode" class="p-3 bg-gray-50 border rounded-xl outline-none">
                    <option value="Solo">Solo</option>
                    <option value="Duo">Duo</option>
                    <option value="Squad">Squad</option>
                </select>
                <input type="datetime-local" id="tTime" class="p-3 bg-gray-50 border rounded-xl outline-none col-span-2">
            </div>
            <button id="btnPublish" class="mt-6 w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">পাবলিশ করুন</button>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-md border border-gray-100">
                <h2 class="text-xl font-bold mb-4 text-green-600 border-b pb-2"><i class="fas fa-wallet mr-2"></i>অ্যাড মানি রিকোয়েস্ট</h2>
                <div id="requestList" class="space-y-3 max-h-[250px] overflow-y-auto pr-2">
                    <p class="text-center text-gray-400">রিকোয়েস্ট নেই</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-md border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-blue-600 border-b pb-2">পেমেন্ট নম্বর আপডেট</h2>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="newBkash" placeholder="বিকাশ নম্বর" class="p-2 border rounded-lg text-xs outline-none">
                    <input type="text" id="newNagad" placeholder="নগদ নম্বর" class="p-2 border rounded-lg text-xs outline-none">
                </div>
                <button id="btnUpdateNumbers" class="mt-3 w-full bg-blue-600 text-white py-2 rounded-lg text-xs font-bold">সেভ করুন</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border border-gray-100 lg:col-span-2">
            <h2 class="text-xl font-bold mb-4 text-red-600 border-b pb-2"><i class="fas fa-money-check-alt mr-2"></i>উইথড্র রিকোয়েস্ট তালিকা</h2>
            <div id="withdrawList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <p class="text-center text-gray-400 col-span-full italic">কোনো উইথড্র রিকোয়েস্ট নেই</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border border-gray-100 lg:col-span-2">
            <h2 class="text-xl font-bold mb-4 text-orange-600 border-b pb-2"><i class="fas fa-tasks mr-2"></i>ম্যাচ ও রেজাল্ট কন্ট্রোল</h2>
            <div id="adminMatchList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border border-gray-100 lg:col-span-2">
            <h2 class="text-xl font-bold mb-4 text-gray-700 border-b pb-2"><i class="fas fa-users mr-2"></i>ইউজার ম্যানেজমেন্ট</h2>
            <div id="userListContainer" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, increment, query, where, deleteDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDB15lIz0BwUaErArj-ooETB79iPCZK3D4",
            authDomain: "bot-864b3.firebaseapp.com",
            projectId: "bot-864b3",
            storageBucket: "bot-864b3.firebasestorage.app",
            messagingSenderId: "82198701869",
            appId: "1:82198701869:web:3c099992e1c64e285355a4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ১. টুর্নামেন্ট তৈরি (স্লট সহ) ---
        document.getElementById('btnPublish').onclick = async () => {
            const title = document.getElementById('tTitle').value;
            const fee = Number(document.getElementById('tFee').value);
            const prize = document.getElementById('tPrize').value;
            const pk = Number(document.getElementById('tPerKill').value);
            const slots = Number(document.getElementById('tSlots').value);
            const mode = document.getElementById('tMode').value;
            const time = document.getElementById('tTime').value;

            if(!title || !fee || !slots) return alert("ম্যাচের নাম, ফি এবং স্লট অবশ্যই দিন!");

            await addDoc(collection(db, "tournaments"), { 
                title, fee, prize, perkill: pk, mode, time, 
                totalSlots: slots, joinedCount: 0, 
                roomId: "", roomPass: "", status: "Upcoming" 
            });
            alert("ম্যাচ সফলভাবে তৈরি হয়েছে!"); location.reload();
        };

        // --- ২. পেমেন্ট নম্বর আপডেট ---
        document.getElementById('btnUpdateNumbers').onclick = async () => {
            const bk = document.getElementById('newBkash').value;
            const ng = document.getElementById('newNagad').value;
            await setDoc(doc(db, "settings", "general"), { bkash: bk, nagad: ng }, { merge: true });
            alert("নম্বর আপডেট হয়েছে!");
        };

        // --- ৩. অ্যাড মানি রিকোয়েস্ট ---
        onSnapshot(query(collection(db, "deposit_requests"), where("status", "==", "Pending")), (snap) => {
            const cont = document.getElementById('requestList'); cont.innerHTML = "";
            snap.forEach(d => {
                const r = d.data();
                cont.innerHTML += `<div class="p-3 bg-gray-50 border rounded-xl flex justify-between items-center text-xs">
                    <div><b>${r.method}</b>: ৳${r.amount}<br><span class='text-[9px]'>Trx: ${r.trxid}</span></div>
                    <button onclick="approveDep('${d.id}','${r.userId}',${r.amount})" class="bg-green-600 text-white px-3 py-1 rounded-lg">Approve</button>
                </div>`;
            });
        });
        window.approveDep = async (id, uid, amt) => {
            await updateDoc(doc(db, "users", uid), { wallet: increment(amt) });
            await deleteDoc(doc(db, "deposit_requests", id)); alert("ডিপোজিট সফল!");
        };

        // --- ৪. উইথড্র রিকোয়েস্ট ---
        onSnapshot(query(collection(db, "withdraw_requests"), where("status", "==", "Pending")), (snap) => {
            const cont = document.getElementById('withdrawList'); cont.innerHTML = snap.empty ? "<p class='text-center text-gray-400 col-span-full'>রিকোয়েস্ট নেই</p>" : "";
            snap.forEach(d => {
                const r = d.data();
                cont.innerHTML += `<div class="p-4 bg-red-50 border border-red-100 rounded-2xl flex justify-between items-center text-xs">
                    <div><b>${r.userName}</b><br>৳${r.amount} (${r.method})<br>${r.number}</div>
                    <div class='flex flex-col gap-1'>
                        <button onclick="delWithdraw('${d.id}')" class="bg-green-600 text-white px-3 py-1 rounded text-[10px]">PAID</button>
                        <button onclick="rejWithdraw('${d.id}','${r.userId}',${r.amount})" class="bg-gray-400 text-white px-3 py-1 rounded text-[10px]">REJECT</button>
                    </div>
                </div>`;
            });
        });
        window.delWithdraw = async (id) => { if(confirm("পেমেন্ট কি করা হয়েছে?")) await deleteDoc(doc(db, "withdraw_requests", id)); };
        window.rejWithdraw = async (id, uid, amt) => { if(confirm("Reject করলে টাকা ইউজারের ওয়ালেটে ফেরত যাবে?")) { await updateDoc(doc(db, "users", uid), { wallet: increment(amt) }); await deleteDoc(doc(db, "withdraw_requests", id)); } };

        // --- ৫. ম্যাচ লিস্ট ও রেজাল্ট ---
        onSnapshot(collection(db, "tournaments"), (snap) => {
            const cont = document.getElementById('adminMatchList'); cont.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                cont.innerHTML += `<div class="p-4 border rounded-2xl bg-white shadow-sm space-y-3">
                    <div class='flex justify-between'><p class='font-bold text-sm'>${m.title}</p><button onclick="delMatch('${d.id}')" class='text-red-500 text-xs'><i class='fas fa-trash'></i></button></div>
                    <p class='text-[10px] text-gray-500 italic'>Joined: ${m.joinedCount} / ${m.totalSlots}</p>
                    <div class='flex gap-2'>
                        <button onclick="setRoom('${d.id}')" class='flex-1 bg-orange-500 text-white py-2 rounded-xl text-[10px] font-bold'>ROOM INFO</button>
                        <button onclick="resPop('${d.id}',${m.perkill},${m.prize})" class='flex-1 bg-green-600 text-white py-2 rounded-xl text-[10px] font-bold'>RESULT</button>
                    </div>
                </div>`;
            });
        });
        window.delMatch = async (id) => { if(confirm("Delete করবেন? এতে জয়েন করা লিস্টও মুছে যাবে।")) await deleteDoc(doc(db, "tournaments", id)); };
        window.setRoom = async (id) => { const r = prompt("Room ID:"); const p = prompt("Pass:"); if(r&&p) await updateDoc(doc(db, "tournaments", id), { roomId: r, roomPass: p }); };

        // রেজাল্ট পপআপ
        window.resPop = async (mid, pk, wp) => {
            const qp = query(collection(db, "joined_players"), where("matchId", "==", mid));
            const snap = await getDocs(qp);
            let h = `<div id='pop' class='fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[100]'><div class='bg-white p-6 rounded-2xl w-full max-w-md max-h-[80vh] overflow-y-auto'>`;
            h += `<h3 class='font-bold mb-4 text-center'>Pay Winners (Match ID: ${mid})</h3>`;
            snap.forEach(p => {
                const pd = p.data();
                h += `<div class='flex justify-between items-center mb-3 border-b pb-2 text-xs'>
                    <span>${pd.playerName}</span>
                    <div class='flex gap-1'>
                        <input id='k_${pd.userId}' type='number' placeholder='Kills' class='w-12 border p-1 rounded'>
                        <button onclick="pay('${pd.userId}',${pk},0)" class='bg-blue-500 text-white px-2 py-1 rounded'>Pay Kill</button>
                        <button onclick="pay('${pd.userId}',${pk},${wp})" class='bg-yellow-500 text-black px-2 py-1 rounded font-bold'>Win</button>
                    </div>
                </div>`;
            });
            h += `<button onclick="document.getElementById('pop').remove()" class='w-full bg-red-500 text-white py-2 mt-4 rounded-xl'>Close</button></div></div>`;
            document.body.insertAdjacentHTML('beforeend', h);
        };
        window.pay = async (uid, pk, wp) => {
            const k = document.getElementById(`k_${uid}`).value || 0;
            const total = (Number(k)*pk) + Number(wp);
            if(confirm(`ইউজারকে ৳${total} পাঠাবেন?`)) { await updateDoc(doc(db, "users", uid), { wallet: increment(total) }); alert("পেমেন্ট সফল!"); }
        };

        // --- ৬. ইউজার ম্যানেজমেন্ট ---
        onSnapshot(collection(db, "users"), (snap) => {
            const cont = document.getElementById('userListContainer'); cont.innerHTML = "";
            snap.forEach(d => {
                const u = d.data(); const b = u.status === "Banned";
                cont.innerHTML += `<div class="p-3 bg-gray-50 border rounded-xl flex justify-between items-center text-[10px]">
                    <div><b>${u.name}</b><br>৳${u.wallet}</div>
                    <button onclick="ban('${d.id}','${u.status}')" class="px-2 py-1 rounded ${b?'bg-green-500':'bg-red-500'} text-white">${b?'UNBAN':'BAN'}</button>
                </div>`;
            });
        });
        window.ban = async (id, s) => { await updateDoc(doc(db, "users", id), { status: s === 'Banned' ? 'Active' : 'Banned' }); };

    </script>
</body>
</html>
